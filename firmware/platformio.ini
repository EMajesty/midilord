[env:midilord]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=0
    ; Enable TinyUSB on the native USB OTG port (separate from the UART bridge).
    ; The board must be flashed via the UART port while USB MIDI is active.
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0

lib_deps =
    fortyseveneffects/MIDI Library@^5.0.2
    arduino-libraries/LiquidCrystal@^1.0.7
    ; AsyncTCP and ESPAsyncWebServer for the config web server
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    ; ArduinoJson for preset storage / web API
    bblanchon/ArduinoJson@^7.0.0
